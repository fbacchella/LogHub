## This list is extracted from sun.security.ssl.CipherSuite
## It keeps the order, which is a preference order

########################
# TLS 1.3 cipher suites.
- model: directory.JavaCipher
  pk: 'TLS_AES_256_GCM_SHA384'
  fields:
    hex_byte_1: '0x13'
    hex_byte_2: '0x02'

- model: directory.JavaCipher
  pk: 'TLS_AES_128_GCM_SHA256'
  fields:
    hex_byte_1: '0x13'
    hex_byte_2: '0x01'

- model: directory.JavaCipher
  pk: 'TLS_CHACHA20_POLY1305_SHA256'
  fields:
    hex_byte_1: '0x13'
    hex_byte_2: '0x03'

################################################
# Suite B compliant cipher suites, see RFC 6460.
- model: directory.JavaCipher
  pk: 'TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384'
  fields:
    hex_byte_1: '0xc0'
    hex_byte_2: '0x2c'

- model: directory.JavaCipher
  pk: 'TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256'
  fields:
    hex_byte_1: '0xc0'
    hex_byte_2: '0x2b'

#####################################################################
# Not suite B, but we want it to position the suite early in the list
# of 1.2 suites.
- model: directory.JavaCipher
  pk: 'TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256'
  fields:
    hex_byte_1: '0xcc'
    hex_byte_2: '0xa9'

